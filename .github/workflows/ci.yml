name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: read
  actions: read

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps (RocksDB)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libclang-dev pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace --all-targets

      - name: management server smoke
        run: |
          cargo build -p ontolith-server --bin ontolith-management-server
          management_slo_max_latency_ms="${ONTOLITH_MANAGEMENT_SLO_MAX_LATENCY_MS:-250}"
          management_smoke_port="${ONTOLITH_MANAGEMENT_SMOKE_PORT:-$((19091 + (RANDOM % 1000)))}"
          management_smoke_bind="127.0.0.1:${management_smoke_port}"
          ONTOLITH_MANAGEMENT_BIND="${management_smoke_bind}" \
          ONTOLITH_BIND="${management_smoke_bind}" \
          ./target/debug/ontolith-management-server >/tmp/ontolith-management-smoke.log 2>&1 &
          mgmt_pid=$!
          trap 'kill "$mgmt_pid" >/dev/null 2>&1 || true' EXIT
          timeout 20s bash -c "until curl -fsS \"http://${management_smoke_bind}/admin/health\" >/dev/null 2>&1; do :; done" || {
            echo "management smoke timeout; server log:"
            tail -n 80 /tmp/ontolith-management-smoke.log || true
            exit 1
          }
          monitoring_json="$(curl -fsS "http://${management_smoke_bind}/admin/monitoring")"
          if ! echo "${monitoring_json}" | grep -q '"runtime_probe"'; then
            echo "management smoke failed: runtime_probe missing"
            echo "payload: ${monitoring_json}"
            exit 1
          fi
          if ! echo "${monitoring_json}" | grep -q '"reachable":true'; then
            echo "management smoke failed: runtime_probe.reachable is not true"
            echo "payload: ${monitoring_json}"
            exit 1
          fi
          latency_ms="$(echo "${monitoring_json}" | sed -n 's/.*"runtime_probe":{[^}]*"latency_ms":\([0-9][0-9]*\).*/\1/p')"
          if [[ -z "${latency_ms}" ]]; then
            echo "management smoke failed: runtime_probe.latency_ms missing"
            echo "payload: ${monitoring_json}"
            exit 1
          fi
          if (( latency_ms > management_slo_max_latency_ms )); then
            echo "management smoke failed: runtime_probe latency ${latency_ms}ms > ${management_slo_max_latency_ms}ms"
            echo "payload: ${monitoring_json}"
            exit 1
          fi
          kill "$mgmt_pid" >/dev/null 2>&1 || true
          wait "$mgmt_pid" 2>/dev/null || true
          trap - EXIT

      - name: SPARQL R1 smoke (integration)
        run: cargo test -p ontolith-compliance --test sparql_r1_smoke -- --nocapture

  # Required-lite gate: block regressions in must-pass subset without requiring
  # zero known-gap / zero unsupported yet.
  w3c-subset:
    name: sparql w3c subset (required-lite)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace

      - name: SPARQL W3C subset (integration)
        run: cargo test -p ontolith-compliance --test sparql_w3c_subset -- --nocapture

  # Strict observer track: keep visibility on xfail/skip debt without blocking
  # merges during this phase.
  w3c-subset-strict:
    name: sparql w3c subset (strict observer, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace

      - name: SPARQL W3C subset strict observer
        run: ONTOLITH_W3C_SUBSET_STRICT=1 cargo test -p ontolith-compliance --test sparql_w3c_subset -- --nocapture

  # Readiness signal for strict promotion:
  # if the most recent 3 push runs on main all have strict observer success,
  # this job emits a "ready" signal in the workflow summary.
  w3c-subset-strict-readiness:
    name: sparql w3c strict promotion readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [w3c-subset, w3c-subset-strict]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Evaluate recent strict observer trend
        id: readiness
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const strictJobName = 'sparql w3c subset (strict observer, non-blocking)';
            const runsResp = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              event: 'push',
              status: 'completed',
              per_page: 20,
            });

            const trend = [];
            for (const run of runsResp.data.workflow_runs) {
              const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: run.id,
                per_page: 100,
              });
              const strictJob = jobsResp.data.jobs.find((j) => j.name === strictJobName);
              if (!strictJob) {
                continue;
              }
              trend.push({
                runId: run.id,
                sha: run.head_sha.slice(0, 7),
                conclusion: strictJob.conclusion,
                url: run.html_url,
              });
              if (trend.length >= 3) {
                break;
              }
            }

            const enoughSamples = trend.length === 3;
            const allGreen = enoughSamples && trend.every((r) => r.conclusion === 'success');
            core.setOutput('ready', allGreen ? 'true' : 'false');

            core.summary.addHeading('W3C Strict Promotion Readiness');
            core.summary.addRaw('Criterion: 3 consecutive `main` push runs with strict observer job = success.\n\n');

            if (!enoughSamples) {
              core.summary.addRaw(`Status: NOT READY (only ${trend.length} sample(s) found).\n\n`);
              core.notice(`Strict promotion readiness: insufficient samples (${trend.length}/3).`);
            } else if (allGreen) {
              core.summary.addRaw('Status: READY (3/3 strict observer runs are green).\n\n');
              core.notice('Strict promotion readiness: READY (3 consecutive greens).');
            } else {
              core.summary.addRaw('Status: NOT READY (latest 3 are not all green).\n\n');
              core.warning('Strict promotion readiness: NOT READY (latest 3 strict observer runs are not all green).');
            }

            if (trend.length > 0) {
              core.summary.addTable([
                [{data: 'Run', header: true}, {data: 'SHA', header: true}, {data: 'Strict conclusion', header: true}],
                ...trend.map((r) => [
                  `[${r.runId}](${r.url})`,
                  r.sha,
                  r.conclusion ?? 'unknown',
                ]),
              ]);
            }
            await core.summary.write();

  # Optional slower job: rocksdb feature is default on server/storage;
  # kept separate so failures are obvious in the matrix later.
  rocksdb-smoke:
    name: rocksdb reopen smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libclang-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - name: storage rocksdb tests
        run: cargo test -p ontolith-storage --features rocksdb-backend -- --nocapture
      - name: server rocksdb backend test
        run: cargo test -p ontolith-server --features rocksdb-backend rocksdb_backend -- --nocapture
